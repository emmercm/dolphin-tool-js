# Requires repo secret: PERSONAL_ACCESS_TOKEN with permissions:
#   Contents: read and write
#   Pull Requests: read and write

name: Dolphin Build

on:
  workflow_dispatch:
    inputs:
      dolphin_ref:
        description: 'Dolphin GitHub version tag (e.g. "2506a")'
        required: true
        type: string
      auto-merge:
        description: 'Auto-merge pull request?'
        required: true
        type: boolean
        default: true
  push:
run-name: "${{ github.workflow }}: ${{ inputs.dolphin_ref || '(default version)' }}"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  dolphin_ref: ${{ inputs.dolphin_ref || '2506a' }}
  igir_ref: ${{ github.head_ref || github.ref }}

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      major: ${{ steps.parse-version.outputs.major }}
      minor: ${{ steps.parse-version.outputs.minor }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: dolphin-emu/dolphin
          ref: ${{ env.dolphin_ref }}
      - id: parse-version
        run: |
          set -euo pipefail
          echo "major=$(grep 'set(DOLPHIN_VERSION_MAJOR' CMake/ScmRevGen.cmake | sed -E 's/.*"([0-9]+)".*/\1/')" >> "${GITHUB_OUTPUT}"
          echo "minor=$(grep 'set(DOLPHIN_VERSION_MINOR' CMake/ScmRevGen.cmake | sed -E 's/.*"([0-9]+)".*/\1/')" >> "${GITHUB_OUTPUT}"

  build-linux:
    name: build-linux ${{ matrix.nodejs_arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          #- docker_image: i386/ubuntu:latest
          #  docker_arch: linux/386
          #  nodejs_arch: ia32
          - docker_image: alpine:latest
            docker_arch: linux/amd64
            nodejs_arch: x64
          - docker_image: alpine:latest
            docker_arch: linux/arm/v7
            nodejs_arch: arm
            cmake_opts: -DENABLE_GENERIC=true
          - docker_image: alpine:latest
            docker_arch: linux/arm64/v8
            nodejs_arch: arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: dolphin-emu/dolphin
          ref: ${{ env.dolphin_ref }}
          submodules: 'recursive'
      - uses: docker/setup-qemu-action@v3
      - name: Build
        uses: addnab/docker-run-action@v3
        with:
          image: ${{ matrix.docker_image }}
          shell: sh
          options: |
            --platform ${{ matrix.docker_arch }}
            --volume ${{ github.workspace }}:/build
            --workdir /build
          run: |
            set -eu
            set -x

            # https://github.com/dolphin-emu/dolphin/wiki/Building-for-Linux
            apk add --no-cache build-base cmake pkgconfig linux-headers

            # Dolphin provides these at ./Externals/, but use the latest available instead, and force static linking.
            # Alpine's *-dev packages bundle .a archives needed by -static.
            apk add --no-cache libusb-dev eudev-dev
            rm -f "$(pkg-config --variable=libdir libusb-1.0)"/libusb-1.0*.so*

            mkdir build && cd build
            cmake \
              -DDISTRIBUTOR="${{ github.repositoryUrl }}" \
              -DENABLE_CLI_TOOL=ON \
              -DUSE_SYSTEM_LIBS=OFF \
              -DUSE_UPNP=OFF \
              -DUSE_DISCORD_PRESENCE=OFF \
              -DENABLE_QT=OFF \
              -DENABLE_ALSA=OFF \
              -DENABLE_PULSEAUDIO=OFF \
              -DENABLE_CUBEB=OFF \
              -DENABLE_LLVM=OFF \
              -DENABLE_TESTS=OFF \
              -DENABLE_VULKAN=OFF \
              -DUSE_MGBA=OFF \
              -DENABLE_AUTOUPDATE=OFF \
              -DENCODE_FRAMEDUMPS=OFF \
              -DENABLE_SDL=OFF \
              -Wno-dev \
              `# Linux options` \
              ${{ matrix.cmake_opts }} \
              -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
              -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=TRUE \
              -DUSE_SYSTEM_ICONV=ON \
              -DCMAKE_C_FLAGS="-ffunction-sections -fdata-sections -fno-strict-aliasing" \
              -DCMAKE_CXX_FLAGS="-ffunction-sections -fdata-sections -fno-strict-aliasing" \
              -DCMAKE_EXE_LINKER_FLAGS="-static -static-libstdc++ -static-libgcc -Wl,--gc-sections -Wl,-s" \
              -DENABLE_X11=OFF \
              -DENABLE_EGL=OFF \
              -DENABLE_HWDB=OFF \
              -DENABLE_EVDEV=OFF \
              -DENABLE_BLUEZ=OFF \
              -DUSE_SYSTEM_LIBUSB=ON \
              ..
            make -j$(nproc)
            mv Binaries/dolphin-tool ../
            cd ../

            # Test binary
            ./dolphin-tool --help || true

            # Strip binary
            ls -al dolphin-tool
            strip dolphin-tool
            ls -al dolphin-tool
      # Fix 'root' owning the 'build/' directory
      - run: sudo chown -R "${USER:=$(/usr/bin/id -run)}:$USER" ./*
      - name: Test binary
        run: |
          set -x
          readelf -d dolphin-tool
          file dolphin-tool
          if readelf -d dolphin-tool | grep -q NEEDED; then
            echo "ERROR: binary has dynamic dependencies, expected fully static"
            readelf -d dolphin-tool | grep NEEDED
            exit 1
          fi
          if ! file dolphin-tool | grep -qE 'statically linked|static-pie linked'; then
            echo "ERROR: 'file' does not report the binary as statically linked"
            exit 1
          fi
      - name: Rename binary
        run: |
          dir="artifacts/packages/dolphin-tool-linux-${{ matrix.nodejs_arch }}"
          mkdir -p "${dir}"
          mv dolphin-tool "${dir}/"
          ls -al "${dir}/"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-${{ matrix.nodejs_arch }}-${{ github.sha }}
          path: artifacts/**/dolphin-tool
          if-no-files-found: error

  build-macos:
    name: build-macos ${{ matrix.nodejs_arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            nodejs_arch: x64
          - os: macos-latest
            nodejs_arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: dolphin-emu/dolphin
          ref: ${{ env.dolphin_ref }}
          submodules: 'recursive'
      - name: Build
        run: |
          brew install qt@6

          # https://github.com/dolphin-emu/dolphin/wiki/Building-for-macOS
          # https://github.com/dolphin-emu/dolphin/blob/2412/BuildMacOSUniversalBinary.py
          mkdir -p build
          cd build
          cmake \
            -DDISTRIBUTOR="${{ github.repositoryUrl }}" \
            -DENABLE_CLI_TOOL=ON \
            -DUSE_SYSTEM_LIBS=OFF \
            -DUSE_UPNP=OFF \
            -DENABLE_QT=OFF \
            -DENABLE_ALSA=OFF \
            -DENABLE_PULSEAUDIO=OFF \
            -DENABLE_CUBEB=OFF \
            -DENABLE_LLVM=OFF \
            -DENABLE_TESTS=OFF \
            -DENABLE_VULKAN=OFF \
            -DUSE_MGBA=OFF \
            -DENABLE_AUTOUPDATE=OFF \
            -DENCODE_FRAMEDUMPS=OFF \
            -DENABLE_SDL=OFF \
            -Wno-dev \
            `# macOS options` \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=TRUE \
            -DSKIP_POSTPROCESS_BUNDLE=true \
            -DUSE_SYSTEM_ICONV=ON \
            -DUSE_SYSTEM_BZIP2=ON \
            -DUSE_SYSTEM_CURL=ON \
            -DCMAKE_C_FLAGS="-fno-strict-aliasing" \
            -DCMAKE_CXX_FLAGS="-fno-strict-aliasing" \
            -DCMAKE_EXE_LINKER_FLAGS="-Wl,-dead_strip" \
            ..
          make "-j$(sysctl -n hw.physicalcpu)" || true
          mv Binaries/dolphin-tool ../
          cd ../
      - name: Test binary
        run: |
          set -x
          ./dolphin-tool --help || true
          file dolphin-tool
          otool -L dolphin-tool
      - name: Strip binary
        run: |
          ls -al dolphin-tool
          strip dolphin-tool
          ls -al dolphin-tool
      - name: Rename binary
        run: |
          dir="artifacts/packages/dolphin-tool-darwin-${{ matrix.nodejs_arch }}"
          mkdir -p "${dir}"
          mv dolphin-tool "${dir}/"
          ls -al "${dir}/"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-${{ matrix.nodejs_arch }}-${{ github.sha }}
          path: artifacts/**/dolphin-tool
          if-no-files-found: error

  build-windows:
    name: build-windows ${{ matrix.nodejs_arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: x64
            nodejs_arch: x64
          - platform: ARM64
            nodejs_arch: arm64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: dolphin-emu/dolphin
          ref: ${{ env.dolphin_ref }}
          submodules: 'recursive'
      - uses: microsoft/setup-msbuild@v2
      - name: Build
        run: |
          msbuild Source/dolphin-emu.sln -maxcpucount /property:Configuration=Release "/property:Platform=${{ matrix.platform }}"
          Get-ChildItem -Path Binary\* -Recurse
          Move-Item -Path Binary\*\DolphinTool.exe -Destination .\
      - name: Rename binary
        run: |
          $Dir = "artifacts\packages\dolphin-tool-win32-${{ matrix.nodejs_arch }}"
          mkdir "$Dir"
          mv DolphinTool.exe "$Dir\DolphinTool.exe"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-${{ matrix.nodejs_arch }}-${{ github.sha }}
          path: artifacts/**/DolphinTool.exe
          if-no-files-found: error
